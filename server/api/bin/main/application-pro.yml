server:
  port: ${PORT:1991}
  servlet:
    session:
      timeout: 1h
  compression:
    enabled: true
    min-response-size: 1024
file-storage:
  local:
    root-path: ./files
custom-cache:
  entries:
    projectCache: 1d
    fileCache: 1h
    userCache: 1d
    deptCache: 1d
    projectPermissionCache: 1d
    commonCache: 30d

# 直接使用 Railway MySQL 插件自动注入的变量（无需手动配置）
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:scripts/init-mysql.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    call-setters-on-nulls: false
  global-config:
    db-config:
      logic-delete-field: deleted
