server:
  port: 7007
  servlet:
    session:
      timeout: 1h
  compression:
    enabled: true
    min-response-size: 1024

spring:
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/surveyking?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:scripts/init-mysql.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    call-setters-on-nulls: false
  global-config:
    db-config:
      logic-delete-field: deleted

file-storage:
  local:
    root-path: ./files
    pathStrategy: byId
    dateFormat: yyyyMM/dd
    nameStrategy: seqAndOriginalName

custom-cache:
  entries:
    projectCache: 1d
    fileCache: 1h
    userCache: 1h
    deptCache: 1d
    projectPermissionCache: 1d
    commonCache: 30d
