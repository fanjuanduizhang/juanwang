server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 1h
  compression:
    enabled: true
    min-response-size: 1024
file-storage:
  local:
    root-path: ./files
custom-cache:
  entries:
    projectCache: 1d
    fileCache: 1h
    userCache: 1d
    deptCache: 1d
    projectPermissionCache: 1d
    commonCache: 30d

# 使用 SPRING_DATASOURCE_* 变量（Railway 手动配置）
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    call-setters-on-nulls: false
  global-config:
    db-config:
      logic-delete-field: deleted
