spring.application.name=SurveyKing
server.port=7007

# ===== MySQL 数据源配置（持久化存储，数据不丢失）=====
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/surveyking?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# SQL 初始化脚本（首次启动建表，后续不重复执行）
spring.sql.init.mode=embedded
spring.sql.init.continueOnError=false
